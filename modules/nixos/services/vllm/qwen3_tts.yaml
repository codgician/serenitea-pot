# Derivative of vllm-omni v0.18.0's bundled
# vllm_omni/model_executor/stage_configs/qwen3_tts.yaml. Upstream budgets
# 0.3 + 0.3 per stage; paimon shares its GPU with qwen-chat + embeddings
# and can only spare a small slice for TTS. Overrides vs upstream:
#   * stage 0 gpu_memory_utilization 0.3 -> 0.10
#   * stage 0 max_num_seqs 10 -> 1
#   * stage 0 kv_cache_dtype auto -> fp8
#   * stage 0 enforce_eager false -> true
#     (upstream CUDA graphs overflow ~2GB outside the budget on first
#      capture: "4.29 GiB allocated in private pools" seen in journalctl)
#   * stage 1 gpu_memory_utilization 0.3 -> 0.06
#     (reserves ~900MB for _ensure_speech_tokenizer_loaded which lazily
#      loads the ~400MB encoder + activations on first request OUTSIDE
#      the budget; see vllm-project/vllm-omni#2341)
#   * stage 1 max_model_len 32768 -> 8192
#     (trims unused KV reservation; max_num_seqs=1 means we never fill it)
#   * codec_chunk_frames 25 -> 12, codec_left_context_frames 25 -> 12
#     (shrinks streaming Code2Wav CUDA graph capture sizes from 25 & 50
#      to 12 & 24, trimming ~300MB from private pools; the 325 non-streaming
#      graph is hardcoded and unaffected)
async_chunk: true
stage_args:
  - stage_id: 0
    stage_type: llm
    is_comprehension: true
    runtime:
      devices: "0"
    engine_args:
      model_stage: qwen3_tts
      max_num_seqs: 4
      model_arch: Qwen3TTSTalkerForConditionalGeneration
      worker_type: ar
      scheduler_cls: vllm_omni.core.sched.omni_ar_scheduler.OmniARScheduler
      enforce_eager: true
      trust_remote_code: true
      async_scheduling: true
      enable_prefix_caching: false
      engine_output_type: latent
      gpu_memory_utilization: 0.10
      kv_cache_dtype: fp8
      distributed_executor_backend: "mp"
      max_num_batched_tokens: 512
      max_model_len: 4096
      custom_process_next_stage_input_func: vllm_omni.model_executor.stage_input_processors.qwen3_tts.talker2code2wav_async_chunk
    output_connectors:
      to_stage_1: connector_of_shared_memory
    default_sampling_params:
      temperature: 0.9
      top_k: 50
      max_tokens: 4096
      seed: 42
      detokenize: false
      repetition_penalty: 1.05
      stop_token_ids: [2150]
  - stage_id: 1
    stage_type: llm
    runtime:
      devices: "0"
    engine_args:
      model_stage: code2wav
      max_num_seqs: 1
      model_arch: Qwen3TTSCode2Wav
      worker_type: generation
      scheduler_cls: vllm_omni.core.sched.omni_generation_scheduler.OmniGenerationScheduler
      enforce_eager: true
      trust_remote_code: true
      async_scheduling: true
      enable_prefix_caching: false
      engine_output_type: audio
      gpu_memory_utilization: 0.06
      distributed_executor_backend: "mp"
      # Must be divisible by num_code_groups and cover (left_context + chunk).
      max_num_batched_tokens: 8192
      # async_chunk appends windows per step; max_model_len must cover accumulated stream.
      # Shrunk from upstream 32768 to trim Stage 1 KV reservation — we pin
      # max_num_seqs=1, so reserved KV is mostly unused anyway.
      max_model_len: 8192
    engine_input_source: [0]
    final_output: true
    final_output_type: audio
    input_connectors:
      from_stage_0: connector_of_shared_memory
    tts_args:
      max_instructions_length: 500
    default_sampling_params:
      temperature: 0.0
      top_p: 1.0
      top_k: -1
      max_tokens: 65536
      seed: 42
      detokenize: true
      repetition_penalty: 1.0
runtime:
  enabled: true
  defaults:
    window_size: -1
    max_inflight: 1
  connectors:
    connector_of_shared_memory:
      name: SharedMemoryConnector
      extra:
        shm_threshold_bytes: 65536
        codec_streaming: true
        connector_get_sleep_s: 0.01
        connector_get_max_wait_first_chunk: 3000
        connector_get_max_wait: 300
        codec_chunk_frames: 12
        codec_left_context_frames: 12
  edges:
    - from: 0
      to: 1
      window_size: -1
